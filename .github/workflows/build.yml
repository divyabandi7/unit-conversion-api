name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore UnitConversionApi/UnitConversionApi.csproj

    - name: Build
      run: dotnet build UnitConversionApi/UnitConversionApi.csproj --no-restore

    - name: Restore test dependencies
      run: dotnet restore UnitConversionApi/UnitConversionApi.Tests/UnitConversionApi.Tests.csproj

    - name: Test
      run: dotnet test UnitConversionApi/UnitConversionApi.Tests/UnitConversionApi.Tests.csproj --no-restore
